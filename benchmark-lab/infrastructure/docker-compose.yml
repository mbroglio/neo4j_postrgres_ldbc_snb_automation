services:
  neo4j:
    image: neo4j:5.20.0-community
    container_name: neo4j-benchmark
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_server_memory_heap_initial__size=6G
      - NEO4J_server_memory_heap_max__size=6G
      - NEO4J_server_memory_pagecache_size=2G
    volumes:
      - ./data/neo4j-sf${SCALE_FACTOR:-0.1}:/data
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  postgres:
    image: postgres:14.4
    container_name: postgres-benchmark
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ldbcsnb
    volumes:
      - ./data/postgres-sf${SCALE_FACTOR:-0.1}:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
