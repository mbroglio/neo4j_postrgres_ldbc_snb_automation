# =============================================================================
# Neo4j 5 Cluster – Autonomous Clustering (Raft)
# =============================================================================
# Topologia: 3 Database Primaries (consenso Raft) + 2 Database Secondaries
#
# Utilizzo:
#   NEO4J_ACCEPT_LICENSE_AGREEMENT=yes docker compose \
#     -f docker-compose-cluster.yml up -d
#
# Entry-point Bolt (routing): localhost:7687  (neo4j-core1)
# =============================================================================

x-neo4j-env: &neo4j-env
  NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
  NEO4J_AUTH: neo4j/password
  NEO4J_server_memory_heap_initial__size: 512m
  NEO4J_server_memory_heap_max__size: 512m
  NEO4J_server_memory_pagecache_size: 256m
  NEO4J_dbms_cluster_minimum__initial__system__primaries__count: "3"

x-neo4j-common: &neo4j-common
  image: neo4j:5.20.0-enterprise
  deploy:
    resources:
      limits:
        # cpus="1.5" per container: previene che un singolo container monopolizzi
        # la CPU dell'host, il che causa latenze anomale sulla rete virtuale Docker
        # (es. un nodo a 6ms, gli altri a 1400ms). Con questo limite ciascun container
        # ha risorse garantite e le latenze Raft si stabilizzano.
        cpus: "1.5"
        memory: 1200m

services:
  # ---------------------------------------------------------------------------
  # Primaries – partecipano al consenso Raft
  # ---------------------------------------------------------------------------
  neo4j-core1:
    <<: *neo4j-common
    container_name: neo4j-core1
    hostname: neo4j-core1
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      <<: *neo4j-env
      NEO4J_server_default__listen__address: "0.0.0.0"
      NEO4J_server_default__advertised__address: "neo4j-core1"
      NEO4J_dbms_cluster_discovery_endpoints: "neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000"
      NEO4J_server_cluster_advertised__address: "neo4j-core1:6000"
      NEO4J_server_cluster_raft_advertised__address: "neo4j-core1:7000"
      NEO4J_server_routing_advertised__address: "neo4j-core1:7687"
      NEO4J_dbms_routing_enabled: "true"
      NEO4J_initial_server_mode__constraint: PRIMARY
    volumes:
      - neo4j-core1-data:/data

  neo4j-core2:
    <<: *neo4j-common
    container_name: neo4j-core2
    hostname: neo4j-core2
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      <<: *neo4j-env
      NEO4J_server_default__listen__address: "0.0.0.0"
      NEO4J_server_default__advertised__address: "neo4j-core2"
      NEO4J_dbms_cluster_discovery_endpoints: "neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000"
      NEO4J_server_cluster_advertised__address: "neo4j-core2:6000"
      NEO4J_server_cluster_raft_advertised__address: "neo4j-core2:7000"
      NEO4J_server_routing_advertised__address: "neo4j-core2:7687"
      NEO4J_dbms_routing_enabled: "true"
      NEO4J_initial_server_mode__constraint: PRIMARY
    volumes:
      - neo4j-core2-data:/data

  neo4j-core3:
    <<: *neo4j-common
    container_name: neo4j-core3
    hostname: neo4j-core3
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      <<: *neo4j-env
      NEO4J_server_default__listen__address: "0.0.0.0"
      NEO4J_server_default__advertised__address: "neo4j-core3"
      NEO4J_dbms_cluster_discovery_endpoints: "neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000"
      NEO4J_server_cluster_advertised__address: "neo4j-core3:6000"
      NEO4J_server_cluster_raft_advertised__address: "neo4j-core3:7000"
      NEO4J_server_routing_advertised__address: "neo4j-core3:7687"
      NEO4J_dbms_routing_enabled: "true"
      NEO4J_initial_server_mode__constraint: PRIMARY
    volumes:
      - neo4j-core3-data:/data

  # ---------------------------------------------------------------------------
  # Secondaries – read-only, log-shipping asincrono
  # ---------------------------------------------------------------------------
  neo4j-secondary1:
    <<: *neo4j-common
    container_name: neo4j-secondary1
    hostname: neo4j-secondary1
    ports:
      - "7477:7474"
      - "7690:7687"
    environment:
      <<: *neo4j-env
      NEO4J_server_default__listen__address: "0.0.0.0"
      NEO4J_server_default__advertised__address: "neo4j-secondary1"
      NEO4J_dbms_cluster_discovery_endpoints: "neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000"
      NEO4J_server_cluster_advertised__address: "neo4j-secondary1:6000"
      NEO4J_server_cluster_raft_advertised__address: "neo4j-secondary1:7000"
      NEO4J_server_routing_advertised__address: "neo4j-secondary1:7687"
      NEO4J_dbms_routing_enabled: "true"
      NEO4J_initial_server_mode__constraint: SECONDARY
    volumes:
      - neo4j-secondary1-data:/data

  neo4j-secondary2:
    <<: *neo4j-common
    container_name: neo4j-secondary2
    hostname: neo4j-secondary2
    ports:
      - "7478:7474"
      - "7691:7687"
    environment:
      <<: *neo4j-env
      NEO4J_server_default__listen__address: "0.0.0.0"
      NEO4J_server_default__advertised__address: "neo4j-secondary2"
      NEO4J_dbms_cluster_discovery_endpoints: "neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000"
      NEO4J_server_cluster_advertised__address: "neo4j-secondary2:6000"
      NEO4J_server_cluster_raft_advertised__address: "neo4j-secondary2:7000"
      NEO4J_server_routing_advertised__address: "neo4j-secondary2:7687"
      NEO4J_dbms_routing_enabled: "true"
      NEO4J_initial_server_mode__constraint: SECONDARY
    volumes:
      - neo4j-secondary2-data:/data

volumes:
  neo4j-core1-data:
  neo4j-core2-data:
  neo4j-core3-data:
  neo4j-secondary1-data:
  neo4j-secondary2-data:

networks:
  default:
    name: neo4j-cluster-net
